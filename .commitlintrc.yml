# Commitlint 配置
# 用于 Git 提交信息规范检查

extends:
  - '@commitlint/config-conventional'

rules:
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - docs
      - style
      - refactor
      - perf
      - test
      - chore
      - revert

  type-case:
    - 2
    - always
    - lower-case

  type-empty:
    - 2
    - never

  scope-empty:
    - 1
    - always

  scope-enum:
    - 2
    - always
    - - home
      - kb
      - case
      - auth
      - db
      - api
      - ui
      - deploy
      - config

  subject-case:
    - 2
    - never
    - - upper-case
      - pascal-case
      - start-case

  subject-empty:
    - 2
    - never

  subject-full-stop:
    - 2
    - never

  header-max-length:
    - 2
    - always
    - 72

  body-max-line-length:
    - 2
    - always
    - 100
