name: CI/CD Pipeline

# 触发条件：任何分支的 push 和 PR
on:
  push:
    branches:
      - main
      - develop
      - 'feat/**'
      - 'fix/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  # 1. 测试任务 - 所有分支都执行
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          # 安全检查：扫描依赖漏洞
          pip install pip-audit
          pip-audit --desc || echo "依赖安全扫描完成（发现潜在问题）"

      - name: Run tests
        run: |
          pytest tests/ -v --cov=common --cov=routes --cov=services --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # 2. 代码检查任务 - 所有分支都执行
  lint:
    name: Code Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit

      - name: Run flake8
        run: |
          flake8 routes/ common/ services/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 routes/ common/ services/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run bandit
        run: |
          bandit -r routes/ common/ services/ -f json -o bandit-report.json || true
          cat bandit-report.json

  # 3. 安全检查任务 - 所有分支都执行
  security:
    name: Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # 注意：不检查配置安全性，因为：
      # 1. 云主机的系统环境变量已单独配置
      # 2. 配置文件不提交到 GitHub
      # 3. CI/CD 只负责代码检查和部署通知

      # 4. 自动合并任务 - 仅当 PR 通过所有检查时执行
  auto-merge:
    name: Auto Merge to Main
    needs: [test, lint, security]
    # 仅在 PR 到 main 分支时执行，且必须有 "auto-merge" 标签
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.labels.*.name, 'auto-merge')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Merge PR with label check
        run: |
          # 验证 PR 状态
          PR_STATE=$(gh pr view ${{ github.event.pull_request.number }} --json state --jq .state)
          if [ "$PR_STATE" != "OPEN" ]; then
            echo "PR 状态不是 OPEN，跳过自动合并"
            exit 0
          fi

          # 验证 auto-merge 标签是否存在
          HAS_LABEL=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[] | select(.name == "auto-merge") | .name')
          if [ -z "$HAS_LABEL" ]; then
            echo "PR 缺少 'auto-merge' 标签，跳过自动合并"
            exit 0
          fi

          # 执行合并
          gh pr merge ${{ github.event.pull_request.number }} --squash --delete-branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 5. 通知云服务器部署 - 仅在 main 分支更新时执行
  notify-deployment:
    name: Notify Cloud Server
    needs: [test, lint, security]
    # 仅在 push 到 main 分支时执行
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version info
        id: version
        run: |
          # 从 commit message 提取版本号（如果有的话）
          VERSION=$(echo "${{ github.event.head_commit.message }}" | grep -oE "v[0-9]+\.[0-9]+\.[0-9]+" | head -1)
          if [ -z "$VERSION" ]; then
            VERSION="latest"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "当前版本: $VERSION"

      - name: Notify cloud server via SSH (备用方案)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          if [ -n "$SSH_HOST" ] && [ -n "$SSH_USERNAME" ] && [ -n "$SSH_PRIVATE_KEY" ]; then
            echo "=========================================="
            echo "通过 SSH 通知云服务器部署..."
            echo "=========================================="
            echo "SSH Host: $SSH_HOST"
            echo "SSH Port: $SSH_PORT"
            echo "SSH Username: $SSH_USERNAME"

            # 设置 SSH 密钥（禁用命令回显以防止私钥泄露到日志）
            set +x
            mkdir -p ~/.ssh
            echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            set -x

            # 添加主机到 known_hosts（使用严格密钥检查）
            echo "添加主机到 known_hosts..."
            ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

            # 测试 SSH 连接
            echo "测试 SSH 连接..."
            if ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p "$SSH_PORT" -o ConnectTimeout=10 \
              "$SSH_USERNAME@$SSH_HOST" "echo 'SSH 连接成功'"; then

              echo "SSH 连接测试成功,触发部署..."

            # 远程执行部署脚本
            echo "执行部署脚本..."
            echo "部署脚本将执行以下步骤:"
            echo "  1. 创建备份"
            echo "  2. 从 GitHub 拉取最新代码"
            echo "  3. 更新/安装依赖"
            echo "  4. 重启应用服务"
            echo "  5. 记录部署日志"
            echo ""

            # 使用严格主机密钥检查（防止中间人攻击）
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=10 -p "$SSH_PORT" \
              "$SSH_USERNAME@$SSH_HOST" "cd /opt/Home-page && chmod +x ./scripts/deploy.sh && bash ./scripts/deploy.sh"

            echo "=========================================="
            echo "SSH 部署通知已发送"
            echo "=========================================="
          else
            echo "❌ SSH 连接测试失败,跳过 SSH 部署"
          fi

            # 清理 SSH 密钥（安全清理）
            set +x
            rm -f ~/.ssh/deploy_key
            rm -f ~/.ssh/known_hosts
            set -x
          else
            echo "=========================================="
            echo "SSH 配置不完整,跳过 SSH 通知"
            echo "=========================================="
            echo "需要配置的 GitHub Secrets:"
            echo "  - SSH_HOST (云主机 IP 或域名)"
            echo "  - SSH_USERNAME (SSH 用户名)"
            echo "  - SSH_PRIVATE_KEY (SSH 私钥)"
            echo "  - SSH_PORT (可选,默认 22)"
            echo ""
            echo "配置方法:"
            echo "  1. 在云主机生成 SSH 密钥对"
            echo "  2. 将公钥添加到 ~/.ssh/authorized_keys"
            echo "  3. 将私钥复制到 GitHub Secrets"
            echo ""
            echo "详细配置指南请参考: docs/CICD/02-CONFIGURATION.md"
          fi

      - name: Deployment notification summary
        if: always()
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "## 📋 部署通知总结" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 方案 | 状态 | 说明 |"
          echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY

          # SSH 通知状态
          if [ -n "$SSH_HOST" ] && [ -n "$SSH_USERNAME" ] && [ -n "$SSH_PRIVATE_KEY" ]; then
            echo "| SSH | ✅ 已配置 | SSH 远程部署 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| SSH | ❌ 未配置 | 未配置 SSH_HOST/SSH_USERNAME/SSH_PRIVATE_KEY |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**注意**: 需要配置 SSH 远程部署" >> $GITHUB_STEP_SUMMARY

      - name: Deployment summary
        run: |
          echo "## 🚀 部署信息" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **仓库**: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **分支**: main" >> $GITHUB_STEP_SUMMARY
          echo "- **提交**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **版本**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **作者**: ${{ github.event.head_commit.author.name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **提交信息**: ${{ github.event.head_commit.message }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "云服务器已收到部署通知，正在自动更新..."
