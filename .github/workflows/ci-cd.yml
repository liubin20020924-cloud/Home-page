name: CI/CD Pipeline

# 触发条件：任何分支的 push 和 PR
on:
  push:
    branches:
      - main
      - develop
      - 'feat/**'
      - 'fix/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  # 1. 测试任务 - 所有分支都执行
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          pytest tests/ -v --cov=common --cov=routes --cov=services --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # 2. 代码检查任务 - 所有分支都执行
  lint:
    name: Code Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit

      - name: Run flake8
        run: |
          flake8 routes/ common/ services/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 routes/ common/ services/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run bandit
        run: |
          bandit -r routes/ common/ services/ -f json -o bandit-report.json || true
          cat bandit-report.json

  # 3. 安全检查任务 - 所有分支都执行
  security:
    name: Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Check dependencies
        run: |
          python scripts/check_dependencies.py

      # 注意：不检查配置安全性，因为：
      # 1. 云主机的系统环境变量已单独配置
      # 2. 配置文件不提交到 GitHub
      # 3. CI/CD 只负责代码检查和部署通知

  # 4. 自动合并任务 - 仅当 PR 通过所有检查时执行
  auto-merge:
    name: Auto Merge to Main
    needs: [test, lint, security]
    # 仅在 PR 到 main 分支时执行
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Merge PR
        uses: pascalgn/automerge-action@v0.15.5
        with:
          # 自动合并条件：PR 标签为 "auto-merge"
          merge-method: squash
          automerge-label: 'auto-merge'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 或者使用 GitHub CLI 直接合并（不依赖标签）
      - name: Auto merge using GitHub CLI
        if: failure()
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --squash --auto
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 5. 通知云服务器部署 - 仅在 main 分支更新时执行
  notify-deployment:
    name: Notify Cloud Server
    needs: [test, lint, security]
    # 仅在 push 到 main 分支时执行
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version info
        id: version
        run: |
          # 从 commit message 提取版本号（如果有的话）
          VERSION=$(echo "${{ github.event.head_commit.message }}" | grep -oE "v[0-9]+\.[0-9]+\.[0-9]+" | head -1)
          if [ -z "$VERSION" ]; then
            VERSION="latest"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "当前版本: $VERSION"

      - name: Notify cloud server via Webhook
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          if [ -n "$WEBHOOK_URL" ]; then
            echo "通知云服务器开始部署..."
            echo "WEBHOOK_SECRET configured: $([ -n "$WEBHOOK_SECRET" ] && echo 'Yes' || echo 'No')"

            # 准备 payload
            PAYLOAD='{
              "ref": "refs/heads/main",
              "repository": "${{ github.repository }}",
              "commit": "${{ github.sha }}",
              "version": "${{ steps.version.outputs.version }}",
              "author": "${{ github.event.head_commit.author.name }}",
              "message": "${{ github.event.head_commit.message }}",
              "timestamp": "${{ github.event.head_commit.timestamp }}"
            }'

            # 如果配置了 WEBHOOK_SECRET，则生成 HMAC-SHA256 签名
            if [ -n "$WEBHOOK_SECRET" ]; then
              SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/^.* //')
              echo "Generated signature: sha256=$SIGNATURE"

              RESPONSE=$(curl -s -X POST "${WEBHOOK_URL}/webhook/github" \
                -H "Content-Type: application/json" \
                -H "X-GitHub-Event: push" \
                -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
                -d "$PAYLOAD")
            else
              echo "No WEBHOOK_SECRET, sending without signature (default key mode)"

              RESPONSE=$(curl -s -X POST "${WEBHOOK_URL}/webhook/github" \
                -H "Content-Type: application/json" \
                -H "X-GitHub-Event: push" \
                -d "$PAYLOAD")
            fi

            echo "云服务器响应: $RESPONSE"
          else
            echo "未配置 WEBHOOK_URL，跳过 webhook 通知"
          fi

      - name: Notify cloud server via SSH (备用方案)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          if [ -n "$SSH_HOST" ] && [ -n "$SSH_USERNAME" ] && [ -n "$SSH_PRIVATE_KEY" ]; then
            echo "=========================================="
            echo "通过 SSH 通知云服务器部署..."
            echo "=========================================="
            echo "SSH Host: $SSH_HOST"
            echo "SSH Port: $SSH_PORT"
            echo "SSH Username: $SSH_USERNAME"

            # 设置 SSH 密钥
            mkdir -p ~/.ssh
            echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key

            # 添加主机到 known_hosts
            echo "添加主机到 known_hosts..."
            ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

            # 测试 SSH 连接
            echo "测试 SSH 连接..."
            if ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p "$SSH_PORT" -o ConnectTimeout=10 \
              "$SSH_USERNAME@$SSH_HOST" "echo 'SSH 连接成功'"; then

              echo "SSH 连接测试成功,触发部署..."

              # 远程执行部署脚本
              echo "执行部署脚本..."
              ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p "$SSH_PORT" \
                "$SSH_USERNAME@$SSH_HOST" "cd /opt/Home-page && ./scripts/deploy.sh"

              echo "=========================================="
              echo "SSH 部署通知已发送"
              echo "=========================================="
            else
              echo "❌ SSH 连接测试失败,跳过 SSH 部署"
            fi

            # 清理 SSH 密钥
            rm -f ~/.ssh/deploy_key
          else
            echo "=========================================="
            echo "SSH 配置不完整,跳过 SSH 通知"
            echo "=========================================="
            echo "需要配置的 GitHub Secrets:"
            echo "  - SSH_HOST (云主机 IP 或域名)"
            echo "  - SSH_USERNAME (SSH 用户名)"
            echo "  - SSH_PRIVATE_KEY (SSH 私钥)"
            echo "  - SSH_PORT (可选,默认 22)"
            echo ""
            echo "配置方法:"
            echo "  1. 在云主机生成 SSH 密钥对"
            echo "  2. 将公钥添加到 ~/.ssh/authorized_keys"
            echo "  3. 将私钥复制到 GitHub Secrets"
            echo ""
            echo "详细配置指南请参考: docs/SSH_DEPLOYMENT.md"
          fi

      - name: Deployment notification summary
        if: always()
        run: |
          echo "## 📋 部署通知总结" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 方案 | 状态 | 说明 |"
          echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY

          # Webhook 通知状态
          if [ -n "$WEBHOOK_URL" ]; then
            echo "| Webhook | ✅ 已配置 | HTTP webhook 通知 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Webhook | ❌ 未配置 | 未配置 WEBHOOK_URL |" >> $GITHUB_STEP_SUMMARY
          fi

          # SSH 通知状态
          if [ -n "$SSH_HOST" ] && [ -n "$SSH_USERNAME" ] && [ -n "$SSH_PRIVATE_KEY" ]; then
            echo "| SSH | ✅ 已配置 | SSH 备用方案 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| SSH | ❌ 未配置 | 未配置 SSH_HOST/SSH_USERNAME/SSH_PRIVATE_KEY |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**注意**: 至少配置一种部署通知方式(Webhook 或 SSH)" >> $GITHUB_STEP_SUMMARY

      - name: Deployment summary
        run: |
          echo "## 🚀 部署信息" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **仓库**: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **分支**: main" >> $GITHUB_STEP_SUMMARY
          echo "- **提交**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **版本**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **作者**: ${{ github.event.head_commit.author.name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **提交信息**: ${{ github.event.head_commit.message }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "云服务器已收到部署通知，正在自动更新..."
