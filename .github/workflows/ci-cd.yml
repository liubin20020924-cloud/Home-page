name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Run tests
        run: |
          pytest tests/ -v --cov=common --cov=routes --cov=services --cov-report=xml
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
  
  lint:
    name: Code Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit
      
      - name: Run flake8
        run: |
          flake8 routes/ common/ services/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 routes/ common/ services/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Run bandit
        run: |
          bandit -r routes/ common/ services/ -f json -o bandit-report.json || true
          cat bandit-report.json
  
  security:
    name: Security Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'
      
      - name: Check dependencies
        run: |
          python scripts/check_dependencies.py
      
      - name: Check config security
        run: |
          python scripts/check_config.py
  
  deploy-gitee:
    name: Deploy to Gitee
    needs: [test, lint, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/github_gitee_rsa
          chmod 600 ~/.ssh/github_gitee_rsa
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
      
      - name: Sync to Gitee
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git remote add gitee git@gitee.com:${{ secrets.GITEE_REPO }}.git || git remote set-url gitee git@gitee.com:${{ secrets.GITEE_REPO }}.git
          git push gitee main:main --force
