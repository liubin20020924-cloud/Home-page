name: Sync to Gitee

# 触发条件：main 分支有新的 push 时执行
on:
  push:
    branches:
      - main
  workflow_dispatch:  # 允许手动触发

jobs:
  sync:
    name: Sync Repository to Gitee
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整的 git 历史

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Add Gitee remote
        env:
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if [ -n "$GITEE_REPO" ] && [ -n "$GITEE_TOKEN" ]; then
            echo "Adding Gitee remote..."
            # 添加 Gitee 远程仓库(使用 token 进行认证)
            GITEE_REPO_WITH_TOKEN="https://${GITEE_TOKEN}@${GITEE_REPO#https://}"
            git remote add gitee "$GITEE_REPO_WITH_TOKEN"

            # 显示远程仓库信息
            echo "GitHub remote:"
            git remote -v | grep origin

            echo "Gitee remote:"
            git remote -v | grep gitee
          else
            echo "Error: GITEE_REPO or GITEE_TOKEN not configured"
            echo "Please configure these secrets in GitHub repository settings"
            exit 1
          fi

      - name: Sync to Gitee
        env:
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
        run: |
          echo "Fetching all branches..."
          git fetch --all

          echo "Syncing main branch to Gitee..."
          git push gitee main --force

          echo "Syncing all tags to Gitee..."
          git push gitee --tags --force

          echo "Sync complete!"
          echo "Repository: $GITEE_REPO"
          echo "Branch: main"

      - name: Sync summary
        run: |
          echo "## 🔄 仓库同步完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **GitHub**: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Gitee**: ${{ secrets.GITEE_REPO }}" >> $GITHUB_STEP_SUMMARY
          echo "- **分支**: main" >> $GITHUB_STEP_SUMMARY
          echo "- **提交**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 代码已成功同步到 Gitee"
