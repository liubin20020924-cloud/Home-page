name: Sync to Gitee

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    name: Sync to Gitee
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/github_gitee_rsa
          chmod 600 ~/.ssh/github_gitee_rsa
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          # 测试SSH连接
          echo "测试SSH连接到Gitee..."
          ssh -i ~/.ssh/github_gitee_rsa -T git@gitee.com || true
      
      - name: Sync to Gitee
        run: |
          # 配置 Git 用户信息
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

          # 显示Gitee仓库信息
          echo "Gitee仓库路径: ${{ secrets.GITEE_REPO }}"

          # 添加 Gitee 远程仓库
          git remote add gitee git@gitee.com:${{ secrets.GITEE_REPO }}.git || git remote set-url gitee git@gitee.com:${{ secrets.GITEE_REPO }}.git

          # 显示远程仓库
          echo "当前远程仓库:"
          git remote -v

          # 显示当前分支
          echo "当前分支:"
          git branch -a

          # 推送到 Gitee
          echo "开始推送到Gitee..."
          GIT_SSH_COMMAND="ssh -i ~/.ssh/github_gitee_rsa -o IdentitiesOnly=yes -o StrictHostKeyChecking=no" git push gitee main:main --force
      
      - name: Notify deployment
        if: success()
        run: |
          echo "✅ 代码已成功同步到 Gitee"
          echo "云主机将在下次检查时自动部署"
