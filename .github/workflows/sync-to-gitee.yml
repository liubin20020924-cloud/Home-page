name: Sync to Gitee

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    name: Sync to Gitee
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/github_gitee_rsa
          chmod 600 ~/.ssh/github_gitee_rsa
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
      
      - name: Sync to Gitee
        run: |
          # 配置 Git 用户信息
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 添加 Gitee 远程仓库
          git remote add gitee git@gitee.com:${{ secrets.GITEE_REPO }}.git || git remote set-url gitee git@gitee.com:${{ secrets.GITEE_REPO }}.git
          
          # 推送到 Gitee
          git push gitee main:main --force
      
      - name: Notify deployment
        if: success()
        run: |
          echo "✅ 代码已成功同步到 Gitee"
          echo "云主机将在下次检查时自动部署"
