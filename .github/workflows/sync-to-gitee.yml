name: Sync to Gitee

# 触发条件：main 分支有新的 push 时执行
on:
  push:
    branches:
      - main
  workflow_dispatch:  # 允许手动触发

jobs:
  sync:
    name: Sync Repository to Gitee
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整的 git 历史

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Setup Git Credential Helper
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          # 使用 credential helper 来处理认证,避免在 URL 中直接包含 token
          echo "Setting up Git credential helper for Gitee..."
          git config --global credential.helper store
          echo "https://oauth2:${GITEE_TOKEN}@gitee.com" > ~/.git-credentials
          chmod 600 ~/.git-credentials

      - name: Add Gitee remote
        env:
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
        run: |
          if [ -n "$GITEE_REPO" ]; then
            echo "Adding Gitee remote..."
            # 添加 Gitee 远程仓库(不包含 token,使用 credential helper)
            git remote add gitee "$GITEE_REPO"

            # 显示远程仓库信息
            echo "GitHub remote:"
            git remote -v | grep origin
            echo "Gitee remote:"
            git remote -v | grep gitee
          else
            echo "Error: GITEE_REPO not configured"
            echo "Please configure this secret in GitHub repository settings"
            exit 1
          fi

      - name: Sync to Gitee
        env:
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
        run: |
          echo "Fetching all branches..."
          git fetch --all

          echo "Syncing main branch to Gitee..."
          if git push gitee main --force; then
            echo "✓ Main branch synced successfully"
          else
            echo "✗ Failed to sync main branch"
            echo "Trying to diagnose the issue..."
            git remote -v
            echo "Checking git credentials..."
            cat ~/.git-credentials 2>/dev/null || echo "No credentials file found"
            exit 1
          fi

          echo "Syncing all tags to Gitee..."
          if git push gitee --tags --force 2>/dev/null || true; then
            echo "✓ Tags synced successfully (or no tags to sync)"
          else
            echo "⚠ Failed to sync tags (continuing...)"
          fi

          echo "Sync complete!"
          echo "Repository: $GITEE_REPO"
          echo "Branch: main"

          # 验证同步结果
          echo ""
          echo "Verification:"
          git log --oneline -1

      - name: Cleanup credentials
        if: always()  # 无论成功失败都执行
        run: |
          # 清理凭证文件
          rm -f ~/.git-credentials
          echo "Credentials cleaned up"

      - name: Sync summary
        if: success()  # 只有成功时才显示总结
        run: |
          echo "## 🔄 仓库同步完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **GitHub**: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Gitee**: ${{ secrets.GITEE_REPO }}" >> $GITHUB_STEP_SUMMARY
          echo "- **分支**: main" >> $GITHUB_STEP_SUMMARY
          echo "- **提交**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 代码已成功同步到 Gitee"
