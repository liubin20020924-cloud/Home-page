{% extends "admin/base.html" %}

{% block title %}留言管理{% endblock %}

{% block page_title %}留言管理{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0"><i class="fas fa-envelope me-2"></i>留言列表</h5>
        <div>
            <select class="form-select form-select-sm d-inline-block w-auto me-2" id="statusFilter">
                <option value="all">全部状态</option>
                <option value="pending">待处理</option>
                <option value="processed">已处理</option>
            </select>
            <button class="btn btn-sm btn-primary" onclick="loadMessages()">
                <i class="fas fa-sync-alt me-1"></i>刷新
            </button>
        </div>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover" id="messagesTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>姓名</th>
                        <th>邮箱</th>
                        <th>电话</th>
                        <th>内容摘要</th>
                        <th>提交时间</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="8" class="text-center">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">加载中...</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 留言详情模态框 -->
<div class="modal fade" id="messageDetailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">留言详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <strong>姓名:</strong> <span id="detailName"></span>
                    </div>
                    <div class="col-md-6">
                        <strong>邮箱:</strong> <span id="detailEmail"></span>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <strong>电话:</strong> <span id="detailPhone"></span>
                    </div>
                    <div class="col-md-6">
                        <strong>提交时间:</strong> <span id="detailTime"></span>
                    </div>
                </div>
                <div class="mb-3">
                    <strong>状态:</strong>
                    <select class="form-select form-select-sm w-auto d-inline-block" id="detailStatus">
                        <option value="pending">待处理</option>
                        <option value="processed">已处理</option>
                    </select>
                </div>
                <hr>
                <h6>留言内容:</h6>
                <div class="border p-3 bg-light" id="detailContent"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-danger me-auto" onclick="deleteCurrentMessage()">
                    <i class="fas fa-trash me-1"></i>删除
                </button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                <button type="button" class="btn btn-primary" onclick="updateMessageStatus()">
                    <i class="fas fa-save me-1"></i>保存状态
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentMessageId = null;

// 加载留言列表
function loadMessages() {
    const status = document.getElementById('statusFilter').value;
    const params = status !== 'all' ? `?status=${status}` : '';
    
    fetch(`/admin/messages/api/list${params}`)
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                const tbody = document.querySelector('#messagesTable tbody');
                if (data.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">暂无数据</td></tr>';
                } else {
                    tbody.innerHTML = data.data.map(msg => `
                        <tr>
                            <td>${msg.id}</td>
                            <td>${msg.name}</td>
                            <td>${msg.email}</td>
                            <td>${msg.phone}</td>
                            <td>${msg.content.substring(0, 50)}...</td>
                            <td>${new Date(msg.created_at).toLocaleString('zh-CN')}</td>
                            <td>
                                <span class="badge bg-${msg.status === 'processed' ? 'success' : 'warning'}">
                                    ${msg.status === 'processed' ? '已处理' : '待处理'}
                                </span>
                            </td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary" onclick="viewMessage(${msg.id})">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </td>
                        </tr>
                    `).join('');
                }
            }
        })
        .catch(error => handleAjaxError(xhr, null, error));
}

// 查看留言详情
function viewMessage(messageId) {
    currentMessageId = messageId;
    
    // TODO: 从列表数据中获取详情或调用API
    // 临时填充示例数据
    document.getElementById('detailName').textContent = '张三';
    document.getElementById('detailEmail').textContent = 'zhang@example.com';
    document.getElementById('detailPhone').textContent = '13800138000';
    document.getElementById('detailTime').textContent = '2024-01-15 10:30:00';
    document.getElementById('detailContent').textContent = '这是一条测试留言内容...';
    document.getElementById('detailStatus').value = 'pending';
    
    bootstrap.Modal.getOrCreateInstance(document.getElementById('messageDetailModal')).show();
}

// 更新留言状态
function updateMessageStatus() {
    const status = document.getElementById('detailStatus').value;
    
    fetch('/admin/messages/api/update', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({id: currentMessageId, status: status})
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert(data.message);
            bootstrap.Modal.getInstance(document.getElementById('messageDetailModal')).hide();
            loadMessages();
        } else {
            alert('更新失败: ' + (data.message || '未知错误'));
        }
    })
    .catch(error => handleAjaxError(xhr, null, error));
}

// 删除当前留言
function deleteCurrentMessage() {
    if (confirm('确定要删除这条留言吗？')) {
        fetch('/admin/messages/api/delete', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id: currentMessageId})
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert(data.message);
                bootstrap.Modal.getInstance(document.getElementById('messageDetailModal')).hide();
                loadMessages();
            } else {
                alert('删除失败: ' + (data.message || '未知错误'));
            }
        })
        .catch(error => handleAjaxError(xhr, null, error));
    }
}

// 状态筛选
document.getElementById('statusFilter').addEventListener('change', loadMessages);

// 初始加载
loadMessages();
</script>
{% endblock %}
